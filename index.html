<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta property="og:title" content="Above the treeline">
<meta property="og:description" content="Notes on data, AI, and the business of enterprise sales, written from somewhere above the noise. New writing every other week.">
<meta property="og:image" content="https://peterboga.com/og-image.png">
<meta property="og:url" content="https://peterboga.com">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://peterboga.com/og-image.png">
<title>Above the treeline — by Peter Boga</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FBF2E6;
    --ink:#1E1812;
    --muted:#8A7A5E;
    --rule:#E4D6BF;
    --tree:#8F7F5E;
    --tree-deep:#5B4F38;
    --accent:#E94E2B;
    --accent-deep:#C63A18;
    --mountain-far:#C9B999;
    --mountain-mid:#A89A7B;
    --rock-fill:#E4D6BF;
    --glow-top:rgba(255,248,232,0.75);
    --glow-bot:rgba(224,212,186,0.35);
    --bg-fade:rgba(245,238,223,0);
    --serif:"EB Garamond", Georgia, serif;
    --sans:"Inter", system-ui, sans-serif;
  }
  [data-theme="dark"]{
    --bg:#141008;
    --ink:#F2E8D6;
    --muted:#9A8A6E;
    --rule:#2D2519;
    --tree:#A89A7B;
    --tree-deep:#D4C6A8;
    --accent:#FF6B47;
    --accent-deep:#FF8A70;
    --mountain-far:#3A3020;
    --mountain-mid:#4E4130;
    --rock-fill:#5B4F38;
    --glow-top:rgba(80,65,40,0.3);
    --glow-bot:rgba(40,32,20,0.2);
    --bg-fade:rgba(20,16,8,0);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg);color:var(--ink);
    font-family:var(--serif);font-weight:400;font-size:19px;line-height:1.6;
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
    transition:background-color .3s ease, color .3s ease;
  }
  a{color:inherit;text-decoration:none}

  .page{
    position:relative;min-height:100vh;
    display:flex;flex-direction:column;
    padding:72px 24px 48px;
    overflow-x:hidden;
    background:
      radial-gradient(1100px 620px at 50% -60px, var(--glow-top), var(--bg-fade) 70%),
      radial-gradient(900px 500px at 50% 100%, var(--glow-bot), var(--bg-fade) 70%),
      var(--bg);
    transition:background .3s ease;
  }
  .scene svg *{transition:fill .3s ease, stroke .3s ease}
  .shell{position:relative;z-index:2;width:100%;max-width:560px;margin:0 auto;flex:1}
  .shell--post{max-width:540px}

  /* ---------- scene (bg illustration layer) ---------- */
  .scene{position:absolute;inset:0;pointer-events:none;z-index:1;overflow:hidden}
  .scene svg{position:absolute;top:0;left:50%;transform:translateX(-50%);
    width:min(1600px,130vw);height:100%;opacity:0.9}

  /* ---------- scroll-locked skier (fixed in viewport) ---------- */
  .skier-fixed{
    position:fixed;
    left:max(20px, calc(50vw - 420px));
    top:140px;
    width:48px;height:64px;
    z-index:3;
    pointer-events:none;
    transition:transform .12s ease-out;
  }

  /* ---------- masthead ---------- */
  .masthead{text-align:center;padding-top:24px}
  .site-title{
    font-family:var(--serif);font-weight:500;font-size:44px;
    line-height:1.05;letter-spacing:-0.015em;margin:0 0 12px;color:var(--ink);
  }
  .site-title .the{color:var(--accent);font-style:italic;font-weight:400}
  .byline{
    font-family:var(--serif);font-style:italic;font-weight:400;font-size:18px;
    color:var(--muted);margin:0 0 28px;
  }

  /* ---------- treeline divider ---------- */
  .treeline{
    display:flex;align-items:flex-end;justify-content:center;gap:14px;
    width:100%;max-width:360px;margin:0 auto;
  }
  .treeline .rule{flex:1;height:0;border-top:0.5px solid var(--tree);margin-bottom:8px}
  .treeline svg{display:block}
  .footer .treeline{max-width:280px}
  .footer .treeline svg{transform:scale(0.82);transform-origin:center bottom}

  /* ---------- nav ---------- */
  .nav{margin:28px auto 0;display:flex;justify-content:center;gap:26px}
  .nav button{all:unset;cursor:pointer;font-family:var(--sans);font-weight:400;
    font-size:11px;letter-spacing:0.18em;text-transform:uppercase;
    color:var(--muted);padding:12px 8px;min-height:44px;transition:color .15s ease}
  .nav button:hover{color:var(--ink)}
  .nav button[aria-current="page"]{color:var(--ink);font-weight:500;position:relative}
  .nav button[aria-current="page"]::after{
    content:"";position:absolute;left:50%;bottom:-8px;
    transform:translateX(-50%);width:14px;height:1.5px;background:var(--accent)}

  .tagline{margin:56px auto 72px;max-width:520px;text-align:center;
    font-family:var(--serif);font-size:22px;line-height:1.5;color:var(--ink);
    font-style:italic;font-weight:400}
  .tagline em{font-style:normal;color:var(--accent);font-weight:500}

  .section-label{font-family:var(--sans);font-size:11px;font-weight:500;
    letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);
    text-align:center;margin:0 0 36px}

  .posts{list-style:none;padding:0;margin:0;display:flex;flex-direction:column}
  .post-card{padding:32px 4px;border-bottom:1px solid var(--rule);
    cursor:pointer;position:relative;transition:padding-left .2s ease}
  .post-card:first-child{border-top:1px solid var(--rule)}
  .post-card::before{content:"";position:absolute;left:-8px;top:50%;
    transform:translateY(-50%) scaleY(0);width:2px;height:28px;
    background:var(--accent);transition:transform .2s ease;transform-origin:center}
  .post-card:hover{padding-left:16px}
  .post-card:hover::before{transform:translateY(-50%) scaleY(1)}
  .post-card:hover .post-title{color:var(--accent-deep)}
  .post-date{font-family:var(--sans);font-size:11px;font-weight:400;
    letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin:0 0 10px}
  .post-title{font-family:var(--serif);font-weight:400;font-size:24px;line-height:1.28;
    letter-spacing:-0.005em;margin:0 0 8px;color:var(--ink);
    transition:color .15s ease;text-wrap:pretty}
  .post-desc{font-family:var(--serif);font-size:17px;line-height:1.5;
    color:var(--muted);margin:0;text-wrap:pretty}

  .archive-head,.about-head{text-align:center;margin:48px 0 56px}
  .archive-head h1,.about-head h1{font-family:var(--serif);font-weight:400;
    font-size:34px;margin:0 0 10px;letter-spacing:-0.005em}
  .archive-head p{font-family:var(--serif);font-size:17px;color:var(--muted);margin:0}

  .prose p{font-family:var(--serif);font-size:19px;line-height:1.7;margin:0 0 1.4em;
    color:var(--ink);text-wrap:pretty}
  .prose p:first-of-type::first-letter{font-family:var(--serif);font-weight:500;
    font-style:normal;font-size:4em;line-height:0.84;float:left;
    margin:0.06em 0.1em 0 -0.04em;color:var(--accent)}
  .prose.bio p::first-letter{all:unset}
  .prose a{color:var(--accent);
    border-bottom:1px solid color-mix(in oklab, var(--accent) 45%, transparent);
    padding-bottom:1px;transition:border-color .15s ease, color .15s ease}
  .prose a:hover{color:var(--ink);border-color:var(--ink)}

  .pull{position:relative;margin:64px -50vw;padding:96px 24px;
    left:50%;right:50%;margin-left:-50vw;margin-right:-50vw;
    background:var(--accent);color:#FFF6EE;text-align:left}
  .pull-inner{max-width:900px;margin:0 auto;display:grid;
    grid-template-columns:120px 1fr;gap:24px;align-items:start}
  .pull-mark{font-family:var(--serif);font-size:96px;line-height:0.7;
    opacity:0.9;color:#FFF6EE;font-style:italic}
  .pull-quote{font-family:var(--serif);font-weight:500;font-size:40px;
    line-height:1.12;letter-spacing:-0.01em;margin:0;text-wrap:balance}
  .pull-attrib{font-family:var(--sans);font-size:11px;letter-spacing:0.2em;
    text-transform:uppercase;margin-top:28px;color:#FFD9C5}
  @media (max-width:640px){
    .pull-inner{grid-template-columns:1fr;gap:8px}
    .pull-mark{font-size:64px}.pull-quote{font-size:28px}
  }

  .post-head{text-align:center;margin:48px 0 56px}
  .post-head .post-date{margin-bottom:16px}
  .post-head h1{font-family:var(--serif);font-weight:400;font-size:34px;
    line-height:1.2;letter-spacing:-0.005em;margin:0 auto;max-width:520px;text-wrap:balance}
  .post-body p{font-family:var(--serif);font-size:19px;line-height:1.75;
    margin:0 0 1.4em;color:var(--ink)}
  .post-body .placeholder{color:var(--muted);font-style:italic}
  .back-link{display:inline-flex;align-items:center;gap:8px;
    font-family:var(--sans);font-size:11px;letter-spacing:0.18em;text-transform:uppercase;
    color:var(--muted);margin-top:56px;cursor:pointer}
  .back-link:hover{color:var(--ink)}

  .footer{margin-top:96px;padding-top:36px;text-align:center;
    font-family:var(--sans);font-size:11px;font-weight:400;
    letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);
    position:relative;z-index:2}
  .footer .treeline{margin-bottom:28px}
  .footer .dot{color:var(--accent);margin:0 6px}

  .theme-toggle{
    position:fixed;top:20px;right:20px;z-index:10;
    width:36px;height:36px;border-radius:50%;
    border:1px solid var(--rule);background:var(--bg);
    color:var(--muted);cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:color .2s ease, border-color .2s ease, background-color .3s ease;
  }
  .theme-toggle:hover{color:var(--ink);border-color:var(--muted)}
  .theme-toggle svg{width:16px;height:16px}

  .view{animation:fade .35s ease both}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

  #tweaks{position:fixed;right:20px;bottom:20px;width:248px;
    background:#fff;border:1px solid var(--rule);padding:16px;
    font-family:var(--sans);font-size:11px;color:var(--ink);display:none;z-index:50}
  #tweaks.on{display:block}
  #tweaks h3{margin:0 0 12px;font-size:10px;letter-spacing:0.2em;
    text-transform:uppercase;color:var(--muted);font-weight:500}
  #tweaks label{display:block;margin-bottom:10px;letter-spacing:0.08em;
    text-transform:uppercase;font-size:10px;color:var(--muted)}
  #tweaks input[type="range"]{width:100%;margin-top:4px}
  #tweaks .row{display:flex;gap:6px;margin-top:4px}
  #tweaks .row button{flex:1;padding:6px 4px;background:var(--bg);
    border:1px solid var(--rule);cursor:pointer;font-family:var(--sans);
    font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink)}
  #tweaks .row button.active{background:var(--ink);color:var(--bg);border-color:var(--ink)}

  @media (max-width: 600px) {
    .site-title { font-size: clamp(32px, 9vw, 48px) !important; }
    body { font-size: clamp(16px, 4.5vw, 19px) !important; }
    .skier-fixed { display: none !important; }
  }
  @media (max-width: 640px) {
    .pull { padding: 48px 20px !important; }
    .footer { margin-top: 56px !important; }
    .page { padding-top: 48px !important; }
    .pull-mark { font-size: 48px !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<div id="tweaks">
  <h3>Tweaks</h3>
  <label>Scenes
    <div class="row" data-group="trail">
      <button data-trail="off">Off</button>
      <button data-trail="subtle">Subtle</button>
      <button data-trail="visible">Visible</button>
    </div>
  </label>
  <label>Title size <span id="t-title-v">44</span>px
    <input id="t-title" type="range" min="32" max="72" value="44">
  </label>
  <label>Body size <span id="t-body-v">19</span>px
    <input id="t-body" type="range" min="16" max="24" value="19">
  </label>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "titleSize": 64,
  "bodySize": 22,
  "trail": "visible",
  "skier": "on"
}/*EDITMODE-END*/;

const POSTS = [
  {slug:"ai-wont-replace-b2b-sales-reps",
   title:"AI won't replace B2B sales reps. It'll replace the ones who already sell like AI.",
   date:"2026-04-19",dateLabel:"April 19, 2026",
   description:"A field-level view on which sales motions are about to get automated, and which just got more valuable."},
  {slug:"data-quality-crisis-in-market-research",
   title:"The data quality crisis in market research, in one chart",
   date:"2026-04-05",dateLabel:"April 5, 2026",
   description:"Why programmatic sampling is both the reason for the boom and the reason the floor is giving out."},
  {slug:"biotech-degree-selling-data",
   title:"What a biotech degree taught me about selling data",
   date:"2026-03-22",dateLabel:"March 22, 2026",
   description:"Sampling is sampling. The thing my MS actually prepared me for wasn't science, it was explaining small-N data to non-scientists."}
];

// ---------- Treeline divider ----------
function Treeline(){
  return (
    <div className="treeline" role="presentation" aria-hidden="true">
      <span className="rule"></span>
      <svg width="72" height="22" viewBox="0 0 72 22">
        <path d="M0 22 L3 17 L6 19 L10 13 L14 16 L18 11 L22 14 L26 9 L31 15 L36 10 L41 14 L46 8 L51 13 L56 11 L61 15 L66 12 L72 22 Z" fill="var(--mountain-mid)" opacity="0.55"/>
        <path d="M0 22 L4 18 L8 14 L11 17 L15 10 L19 15 L23 6 L27 12 L31 4 L34 9 L37 7 L40 13 L44 8 L47 15 L51 11 L55 17 L59 13 L63 19 L68 15 L72 22 Z" fill="var(--tree-deep)"/>
        <path d="M29 12 L30.2 10 L31.4 12 Z" fill="var(--accent)" opacity="0.95"/>
        <path d="M43 13 L44 11.5 L45 13 Z" fill="var(--accent)" opacity="0.8"/>
      </svg>
      <span className="rule"></span>
    </div>
  );
}

// ---------- Reusable drawing pieces ----------
function Pine({cx, top, h, sw=1.1, opacity=0.85, accent=false}){
  const stroke = accent ? "var(--accent)" : "var(--tree)";
  const rows = 6, step = h/rows, lines = [];
  lines.push(<line key="t" x1={cx} y1={top} x2={cx} y2={top+h}/>);
  for(let i=1;i<=rows;i++){
    const y = top + i*step;
    const reach = 10 + i*3.5;
    const drop = 2 + i*0.8;
    lines.push(<line key={"l"+i} x1={cx} y1={y-step*0.7} x2={cx-reach} y2={y-step*0.7+drop}/>);
    lines.push(<line key={"r"+i} x1={cx} y1={y-step*0.7} x2={cx+reach} y2={y-step*0.7+drop}/>);
  }
  return <g stroke={stroke} strokeLinecap="round" strokeWidth={sw} fill="none" opacity={opacity}>{lines}</g>;
}

function Bird({x,y,s=1,accent=false}){
  const stroke = accent ? "var(--accent)" : "var(--tree)";
  return (
    <g stroke={stroke} strokeLinecap="round" strokeWidth={1.2} fill="none" opacity="0.9"
       transform={`translate(${x} ${y}) scale(${s})`}>
      <path d="M -8 4 Q -4 -2 0 2 Q 4 -2 8 4"/>
    </g>
  );
}

function Sun({x,y,r=22}){
  const rays = [];
  for(let i=0;i<12;i++){
    const a = (i/12)*Math.PI*2;
    const r1 = r+6, r2 = r+14;
    rays.push(<line key={i} x1={x+Math.cos(a)*r1} y1={y+Math.sin(a)*r1}
              x2={x+Math.cos(a)*r2} y2={y+Math.sin(a)*r2}/>);
  }
  return (
    <g stroke="var(--accent)" strokeLinecap="round" strokeWidth={1.2} fill="none" opacity="0.8">
      <circle cx={x} cy={y} r={r}/>
      {rays}
    </g>
  );
}

function Cloud({x,y,s=1,accent=false}){
  const stroke = accent ? "var(--accent)" : "var(--tree)";
  return (
    <g transform={`translate(${x} ${y}) scale(${s})`} stroke={stroke}
       strokeWidth="1.1" strokeLinecap="round" fill="none" opacity="0.55">
      <path d="M 0 0 q 6 -10 16 -6 q 6 -10 20 -4 q 10 -2 14 6 q 6 0 8 6 l -58 0 q -6 -4 0 -8 z"/>
    </g>
  );
}

function Cabin({x,y,s=1}){
  return (
    <g transform={`translate(${x} ${y}) scale(${s})`} stroke="var(--tree-deep)" strokeWidth="1.2"
       strokeLinecap="round" fill="none" opacity="0.85">
      {/* body */}
      <rect x="0" y="20" width="44" height="26"/>
      {/* roof */}
      <path d="M -4 20 L 22 2 L 48 20 Z"/>
      {/* door */}
      <rect x="18" y="32" width="10" height="14"/>
      {/* window */}
      <rect x="32" y="26" width="6" height="6"/>
      {/* smoke from chimney */}
      <path d="M 36 6 q 4 -6 0 -12 q -4 -6 0 -12" stroke="var(--tree)" opacity="0.5"/>
    </g>
  );
}

function Mountain({points, fill, opacity=0.5}){
  return <path d={points} fill={fill} opacity={opacity}/>;
}

function Branch({x,y,rot=0,scale=1,accent=false}){
  const stroke = accent ? "var(--accent)" : "var(--tree)";
  return (
    <g transform={`translate(${x} ${y}) rotate(${rot}) scale(${scale})`}
       stroke={stroke} strokeWidth="1.1" strokeLinecap="round" fill="none" opacity="0.8">
      <path d="M 0 0 Q 30 -8 70 -4"/>
      <path d="M 20 -6 Q 26 -14 30 -4"/>
      <path d="M 35 -8 Q 42 -16 46 -6"/>
      <path d="M 50 -6 Q 56 -14 62 -4"/>
    </g>
  );
}

function Deer({x,y,s=1}){
  return (
    <g transform={`translate(${x} ${y}) scale(${s})`} stroke="var(--tree-deep)"
       strokeWidth="1.1" strokeLinecap="round" fill="none" opacity="0.75">
      <ellipse cx="10" cy="6" rx="8" ry="4"/>
      <line x1="18" y1="4" x2="22" y2="-2"/>
      <circle cx="22" cy="-3" r="2"/>
      {/* antlers */}
      <path d="M 22 -5 l -2 -4 M 22 -5 l 1 -5 M 23 -5 l 3 -4"/>
      {/* legs */}
      <line x1="4" y1="10" x2="4" y2="16"/>
      <line x1="8" y1="10" x2="8" y2="16"/>
      <line x1="13" y1="10" x2="13" y2="16"/>
      <line x1="17" y1="10" x2="17" y2="16"/>
    </g>
  );
}

function Rock({x,y,s=1}){
  return (
    <g transform={`translate(${x} ${y}) scale(${s})`} stroke="var(--tree-deep)"
       strokeWidth="1" strokeLinecap="round" fill="var(--rock-fill)" opacity="0.7">
      <path d="M 0 12 Q 4 4 12 2 Q 22 0 28 6 Q 34 12 32 14 L 0 14 Z"/>
    </g>
  );
}

// ---------- SCENES ----------
// HOME: ski run down a slope — trails, pines, sun, birds, distant hills
function SceneHome({op}){
  const trees = [
    {cx:60,top:200,h:140,sw:1.1,opacity:0.7,accent:false},
    {cx:210,top:440,h:170,sw:1.2,opacity:0.85,accent:true},
    {cx:90,top:840,h:190,sw:1.2,opacity:0.9,accent:false},
    {cx:250,top:1200,h:150,sw:1.1,opacity:0.8,accent:false},
    {cx:70,top:1500,h:160,sw:1.1,opacity:0.8,accent:true},
    {cx:1310,top:240,h:180,sw:1.2,opacity:0.9,accent:true},
    {cx:1180,top:520,h:160,sw:1.1,opacity:0.8,accent:false},
    {cx:1330,top:900,h:200,sw:1.3,opacity:0.95,accent:false},
    {cx:1220,top:1260,h:150,sw:1.1,opacity:0.8,accent:true},
    {cx:1340,top:1560,h:170,sw:1.2,opacity:0.85,accent:false}
  ];
  return (
    <div className="scene" style={{opacity:op}}>
      <svg viewBox="0 0 1400 1800" preserveAspectRatio="xMidYMid slice">
        {/* distant hills */}
        <Mountain points="M 0 320 L 120 220 L 260 300 L 420 180 L 600 280 L 780 200 L 960 290 L 1150 190 L 1320 270 L 1400 240 L 1400 360 L 0 360 Z" fill="var(--mountain-far)" opacity={0.35}/>
        <Mountain points="M 0 400 L 160 320 L 340 380 L 520 300 L 720 380 L 900 310 L 1100 380 L 1300 320 L 1400 360 L 1400 440 L 0 440 Z" fill="var(--mountain-mid)" opacity={0.3}/>

        {/* sun + clouds + birds */}
        <Sun x={1260} y={120} r={24}/>
        <Cloud x={240} y={120} s={1.2}/>
        <Cloud x={560} y={80} s={1}/>
        <Cloud x={900} y={140} s={1.4}/>
        <Bird x={400} y={110} s={1}/>
        <Bird x={480} y={150} s={0.8}/>
        <Bird x={560} y={90} s={1.1} accent/>
        <Bird x={820} y={120} s={0.9}/>

function Scene({page, mode}){
  if(mode === "off") return null;
  const op = mode === "visible" ? 0.9 : 0.5;
  const route = page.startsWith("post:") ? "post" : page;
  if(route === "post") return null; // keep reader clean
  if(route === "home") return <SceneHome op={op}/>;
  if(route === "writing") return <SceneWriting op={op}/>;
  if(route === "about") return <SceneAbout op={op}/>;
  return null;
}

// ---------- Scroll-locked skier ----------
function ScrollSkier({enabled}){
  const [t, setT] = React.useState(0); // 0..1 scroll progress
  React.useEffect(() => {
    const onScroll = () => {
      const max = Math.max(1, document.documentElement.scrollHeight - window.innerHeight);
      setT(Math.min(1, Math.max(0, window.scrollY / max)));
    };
    onScroll();
    window.addEventListener("scroll", onScroll, {passive:true});
    window.addEventListener("resize", onScroll);
    return () => {
      window.removeEventListener("scroll", onScroll);
      window.removeEventListener("resize", onScroll);
    };
  }, []);

  if(!enabled) return null;

  // Horizontal wander: sine wave through scroll so skier carves
  const wander = Math.sin(t * Math.PI * 3) * 40;  // px left/right
  // Pose: crouch (0) at middle of page, jump (-10 y offset) near 0.5-0.55
  const inJump = t > 0.48 && t < 0.56;
  const jumpLift = inJump ? -18 * Math.sin((t - 0.48)/0.08 * Math.PI) : 0;
  // Slight rotation based on wander direction
  const tilt = Math.cos(t * Math.PI * 3) * 12;

  return (
    <div className="skier-fixed"
         style={{
           transform:`translate(${wander}px, ${jumpLift}px)`,
           top: `${120 + t * (window.innerHeight - 280)}px`
         }}>
      <svg width="48" height="64" viewBox="-24 -32 48 64">
        <g transform={`rotate(${tilt})`} stroke="var(--tree-deep)" strokeWidth="1.8"
           strokeLinecap="round" fill="none">
          {/* head */}
          <circle cx="0" cy="-18" r="4" fill="var(--accent)" stroke="var(--accent)"/>
          {/* body */}
          <line x1="0" y1="-14" x2={inJump?"-2":"2"} y2="2"/>
          {/* crouched arms */}
          <line x1={inJump?"-2":"2"} y1="-6" x2={inJump?"-12":"-8"} y2={inJump?"-14":"-2"}/>
          <line x1={inJump?"-2":"2"} y1="-6" x2={inJump?"12":"10"} y2={inJump?"-14":"-2"}/>
          {/* legs bent */}
          <line x1={inJump?"-2":"2"} y1="2" x2={inJump?"-6":"-4"} y2={inJump?"8":"12"}/>
          <line x1={inJump?"-2":"2"} y1="2" x2={inJump?"6":"8"} y2={inJump?"8":"12"}/>
          {/* skis — angled like they're pointing downhill */}
          <g transform={`translate(${inJump?-5:0} ${inJump?11:15.5}) rotate(-14)`}>
            <line x1="-10" y1="-1" x2="8" y2="1" strokeWidth="2.4"/>
          </g>
          <g transform={`translate(${inJump?1:3} ${inJump?13.5:17}) rotate(-14)`}>
            <line x1="-9" y1="-1" x2="9" y2="1" strokeWidth="2.4"/>
          </g>
          {/* poles */}
          <line x1={inJump?"-12":"-8"} y1={inJump?"-14":"-2"} x2={inJump?"-14":"-10"} y2="16" stroke="var(--accent)"/>
          <line x1={inJump?"12":"10"} y1={inJump?"-14":"-2"} x2={inJump?"14":"12"} y2="16" stroke="var(--accent)"/>
        </g>
      </svg>
    </div>
  );
}

function App(){
  const [page, setPage] = React.useState(() => { try { return localStorage.getItem("att:page") || "home"; } catch(e){ return "home"; } });
  const [theme, setTheme] = React.useState(() => { try { return localStorage.getItem("att:theme") || "light"; } catch(e){ return "light"; } });
  const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);

  React.useEffect(() => {
    try { localStorage.setItem("att:page", page); } catch(e){}
    window.scrollTo({top:0, behavior:"instant"});
  }, [page]);

  React.useEffect(() => {
    try { localStorage.setItem("att:theme", theme); } catch(e){}
    document.documentElement.setAttribute("data-theme", theme);
  }, [theme]);

  React.useEffect(() => {
    const prev = document.getElementById("tweaks-live");
    if(prev) prev.remove();
    const style = document.createElement("style");
    style.id = "tweaks-live";
    style.textContent = `.site-title{font-size:${tweaks.titleSize}px} body{font-size:${tweaks.bodySize}px}`;
    document.head.appendChild(style);
  }, [tweaks]);

  const go = (p) => setPage(p);

  React.useEffect(() => {
    const panel = document.getElementById("tweaks");
    const onMsg = (e) => {
      if(!e.data || typeof e.data !== "object") return;
      if(e.data.type === "__activate_edit_mode") panel.classList.add("on");
      if(e.data.type === "__deactivate_edit_mode") panel.classList.remove("on");
    };
    window.addEventListener("message", onMsg);
    window.parent.postMessage({type:"__edit_mode_available"}, "*");

    const titleEl = document.getElementById("t-title");
    const titleV  = document.getElementById("t-title-v");
    const bodyEl  = document.getElementById("t-body");
    const bodyV   = document.getElementById("t-body-v");

    const setGroupActive = (group, value, key) => {
      panel.querySelectorAll(`[data-group="${group}"] button`).forEach(b => {
        b.classList.toggle("active", b.dataset[key] === value);
      });
    };

    titleEl.value = tweaks.titleSize; titleV.textContent = tweaks.titleSize;
    bodyEl.value  = tweaks.bodySize;  bodyV.textContent  = tweaks.bodySize;
    setGroupActive("trail", tweaks.trail, "trail");

    const persist = (patch) => window.parent.postMessage({type:"__edit_mode_set_keys", edits:patch}, "*");
    const hTitle = () => { const v = +titleEl.value; titleV.textContent = v; setTweaks(t => ({...t, titleSize:v})); persist({titleSize:v}); };
    const hBody  = () => { const v = +bodyEl.value;  bodyV.textContent  = v; setTweaks(t => ({...t, bodySize:v}));  persist({bodySize:v}); };
    const hTrail = (e) => { const v = e.currentTarget.dataset.trail; setGroupActive("trail", v, "trail"); setTweaks(t => ({...t, trail:v})); persist({trail:v}); };

    titleEl.addEventListener("input", hTitle);
    bodyEl.addEventListener("input", hBody);
    const trailBtns = panel.querySelectorAll('[data-group="trail"] button');
    trailBtns.forEach(b => b.addEventListener("click", hTrail));

    return () => {
      window.removeEventListener("message", onMsg);
      titleEl.removeEventListener("input", hTitle);
      bodyEl.removeEventListener("input", hBody);
      trailBtns.forEach(b => b.removeEventListener("click", hTrail));
    };
  }, []);

  const shellClass = page.startsWith("post:") ? "shell shell--post" : "shell";
  let view;
  if(page === "home") view = <HomePage go={go}/>;
  else if(page === "writing") view = <WritingPage go={go}/>;
  else if(page === "about") view = <AboutPage go={go}/>;
  else if(page.startsWith("post:")) view = <PostPage slug={page.slice(5)} go={go}/>;
  else view = <HomePage go={go}/>;

  const isPost = page.startsWith("post:");

  const toggleTheme = () => setTheme(t => t === "dark" ? "light" : "dark");

  return (
    <div className="page" data-screen-label={page}>
      <Scene page={page} mode={tweaks.trail}/>
      <ThemeToggle theme={theme} onToggle={toggleTheme}/>
      <div className={shellClass} key={page}>{view}</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
